on:
  pull_request_target:
jobs:
  build:
    permissions: read-all
    runs-on: ubuntu-latest
    steps:
      - name: dump
        env:
          HEAD_REF: ${{ github.head_ref }}
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: |
          echo "$HEAD_REF"
          echo "test"
          echo "$GITHUB_CONTEXT"
      - name: checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref }}
      - run: cat ./README.md
      - run: make foo
